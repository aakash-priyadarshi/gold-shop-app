<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orivraa — Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .splash {
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #d4a843, #b8922e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #0a0a0a;
      letter-spacing: -1px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    p {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto;
      border: 3px solid transparent;
      border-top-color: #d4a843;
      border-right-color: #b8922e80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">O</div>
    <h1>Orivraa</h1>
    <p>Connecting to Orivraa...</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Redirect to the live site after a brief splash
    setTimeout(function() {
      window.location.href = 'https://www.orivraa.com';
    }, 800);
  </script>
</body>
</html>
