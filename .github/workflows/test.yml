# Automated Test Suite
# Tests against PRODUCTION servers (api.orivraa.com / www.orivraa.com)
# No need to build or start local servers — everything runs online.

name: Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: # manual trigger from GitHub UI
  schedule:
    - cron: "0 6 * * *" # daily at 6:00 UTC — monitors production health

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "10.27.0"
  # Production URLs — all tests run against these
  API_URL: "https://api.orivraa.com"
  SMOKE_TEST_URL: "https://api.orivraa.com"
  BASE_URL: "https://www.orivraa.com"
  API_BASE_URL: "https://api.orivraa.com/api"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════
  # Setup: Install Dependencies
  # ══════════════════════════════════════════════════════════
  setup:
    name: 📦 Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ══════════════════════════════════════════════════════════
  # Smoke Tests (against production API)
  # ══════════════════════════════════════════════════════════
  smoke-tests:
    name: 💨 Smoke Tests (Production)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Verify production API is reachable
        run: |
          echo "Testing production API connectivity..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.orivraa.com/api/health)
          echo "API health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Production API returned $STATUS — tests may fail"
          fi

      - name: Run smoke tests against production
        run: pnpm smoke-test:full
        env:
          SMOKE_TEST_URL: "https://api.orivraa.com/api"

  # ══════════════════════════════════════════════════════════
  # E2E Browser Tests (Playwright → production)
  # ══════════════════════════════════════════════════════════
  e2e-tests:
    name: 🎭 E2E Browser Tests (Production)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright tests against production
        run: pnpm e2e -- --project=chromium
        continue-on-error: true
        env:
          BASE_URL: "https://www.orivraa.com"
          API_BASE_URL: "https://api.orivraa.com/api"
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-results/
            e2e/test-results/
          retention-days: 14
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  # Summary
  # ══════════════════════════════════════════════════════════
  test-summary:
    name: 📊 Test Summary
    needs: [smoke-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## Test Results Summary (Production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Target: **api.orivraa.com** / **www.orivraa.com**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Browser | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
