name: Search Console Sitemap Sync

on:
  push:
    branches: [master, main]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate sitemap reachability without submitting to Search Console"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.27.0"

concurrency:
  group: search-console-sitemap
  cancel-in-progress: false

jobs:
  submit-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare Search Console config
        id: config
        shell: bash
        run: |
          SITEMAP_URL="${{ vars.SEARCH_CONSOLE_SITEMAP_URL }}"
          if [[ -z "$SITEMAP_URL" ]]; then
            SITEMAP_URL="https://www.orivraa.com/sitemap.xml"
          fi

          echo "sitemap_url=$SITEMAP_URL" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "submit=false" >> "$GITHUB_OUTPUT"
            echo "auth_mode=dry-run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_SERVICE_ACCOUNT=false
          if [[ -n "${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON }}" ]]; then
            HAS_SERVICE_ACCOUNT=true
          fi

          HAS_OAUTH=false
          if [[ -n "${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_ID }}" && -n "${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_SECRET }}" && -n "${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_REFRESH_TOKEN }}" ]]; then
            HAS_OAUTH=true
          fi

          if [[ -z "${{ secrets.SEARCH_CONSOLE_PROPERTY }}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "submit=false" >> "$GITHUB_OUTPUT"
            echo "auth_mode=missing-property" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Search Console submission. Add SEARCH_CONSOLE_PROPERTY to enable automation."
            exit 0
          fi

          if [[ "$HAS_OAUTH" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "submit=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=oauth-user" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$HAS_SERVICE_ACCOUNT" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "submit=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=service-account" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "submit=false" >> "$GITHUB_OUTPUT"
          echo "auth_mode=missing-auth" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping Search Console submission. Add either GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON or GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_ID, GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_SECRET, and GOOGLE_SEARCH_CONSOLE_OAUTH_REFRESH_TOKEN."
          exit 0

      - uses: actions/checkout@v4
        if: steps.config.outputs.ready == 'true'

      - name: Setup pnpm
        if: steps.config.outputs.ready == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.config.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.config.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Allow production deploy to settle
        if: steps.config.outputs.ready == 'true' && github.event_name == 'push'
        shell: bash
        run: |
          echo "Push trigger detected, waiting 5 minutes for production deploy to settle"
          sleep 300

      - name: Wait for sitemap to become reachable
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error "${{ steps.config.outputs.sitemap_url }}" > /dev/null; then
              echo "::notice::Sitemap is reachable"
              exit 0
            fi

            echo "Attempt $attempt of 20: sitemap not reachable yet"
            sleep 30
          done

          echo "::error::Sitemap never became reachable at ${{ steps.config.outputs.sitemap_url }}"
          exit 1

      - name: Submit sitemap to Search Console
        if: steps.config.outputs.ready == 'true'
        env:
          GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_ID }}
          GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_SEARCH_CONSOLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SEARCH_CONSOLE_OAUTH_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_OAUTH_ACCOUNT_EMAIL }}
          SEARCH_CONSOLE_PROPERTY: ${{ secrets.SEARCH_CONSOLE_PROPERTY }}
          SEARCH_CONSOLE_SITEMAP_URL: ${{ steps.config.outputs.sitemap_url }}
        shell: bash
        run: |
          if [[ "${{ steps.config.outputs.submit }}" == "true" ]]; then
            pnpm seo:submit-sitemap
          else
            pnpm seo:submit-sitemap --dry-run
          fi

      - name: Workflow summary
        if: always() && steps.config.outputs.ready == 'true'
        run: |
          echo "## Search Console Sitemap Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sitemap: ${{ steps.config.outputs.sitemap_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Auth mode: ${{ steps.config.outputs.auth_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Submission mode: ${{ steps.config.outputs.submit == 'true' && 'live submit' || 'dry run' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
