# ═══════════════════════════════════════════════════════════
# Orivraa Desktop — Build & Release
# Builds Windows (MSI + NSIS) and macOS (DMG) installers
# Triggered on version tags or manual dispatch
# ═══════════════════════════════════════════════════════════

name: Desktop Build

on:
  push:
    tags:
      - 'desktop-v*'   # e.g., desktop-v0.1.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: false
        default: 'dev'
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos

env:
  TAURI_BUILD: '1'
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ─── Windows Build ────────────────────────────────────
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD: '1'
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: 'Orivraa Desktop v__VERSION__'
          releaseBody: |
            ## Orivraa Desktop v__VERSION__
            
            ### Windows Installers
            - **MSI**: Standard Windows Installer
            - **EXE (NSIS)**: Interactive installer with language selection
            
            Download and run the installer. The app will auto-update on future releases.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

  # ─── macOS Build ──────────────────────────────────────
  build-macos:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Build Tauri app (universal binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD: '1'
          # Uncomment when Apple Developer signing is configured:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: 'Orivraa Desktop v__VERSION__'
          releaseBody: |
            ## Orivraa Desktop v__VERSION__
            
            ### macOS Installer
            - **DMG**: Drag-and-drop installer for macOS 10.15+
            
            > ⚠️ macOS builds are currently unsigned. You may need to right-click → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin
